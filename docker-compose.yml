version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=${DEMO_MODE:-true}
    env_file: .env
    depends_on:
      - influxdb
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=buildopt2024
      - DOCKER_INFLUXDB_INIT_ORG=buildopt
      - DOCKER_INFLUXDB_INIT_BUCKET=building_metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=buildopt-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

volumes:
  influxdb_data:
